<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Corner Pub - Waiter</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- SweetAlert2 for Modals -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- WebSocket Libs -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/cameriere.css">
</head>

<body>

    <!-- LOGIN VIEW -->
    <div id="view-login" class="auth-wrapper" style="display: none;">
        <div class="auth-card">
            <h2>Accesso Staff</h2>
            <p>Corner Pub - Cameriere</p>
            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary">Accedi</button>
            </form>
        </div>
    </div>

    <!-- MAIN APP VIEW (Tables) -->
    <div id="view-tables" style="display: none;">
        <header class="app-header">
            <div class="app-title">Tavoli e Comande</div>
            <button id="btn-logout" class="btn-round" aria-label="Esci">🔌</button>
        </header>

        <div class="tabs-cameriere"
            style="display:flex; gap:1rem; margin-bottom: 1rem; padding: 0 1.5rem; justify-content: center; margin-top: 1rem;">
            <button id="btn-tab-tables" class="btn btn-primary" style="flex: 1;">Tavoli Aperti</button>
            <button id="btn-tab-archived" class="btn"
                style="flex: 1; background:var(--surface-color); border:1px solid #ccc; color:#333;">Storico Ultime
                12h</button>
        </div>

        <div class="container">
            <div id="tables-list" class="grid-mobile-list">
                <!-- Tables injected here -->
            </div>

            <div id="archived-list" class="grid-mobile-list" style="display:none;">
                <!-- Archived orders injected here -->
            </div>

            <button id="btn-new-table" class="fab-bottom">+</button>
        </div>
    </div>

    <!-- ORDER VIEW (Inside a table) -->
    <div id="view-order" style="display: none;">
        <header class="app-header">
            <button id="btn-back-tables" class="btn-round">←</button>
            <div class="app-title">Tavolo <span id="current-table-display">--</span> <span id="current-order-status"
                    style="margin-left: 0.5rem; font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 12px; font-weight: 600;"></span>
            </div>
            <div class="table-badge" id="order-badge">0 Righe</div>
        </header>

        <div class="container">
            <!-- Search & Categories -->
            <div style="margin-bottom: 1rem; display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 0.5rem;">
                <input type="text" id="menu-search" placeholder="Cerca piatto...">
            </div>

            <div id="menu-categories"
                style="display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 1rem; margin-bottom: 0.5rem;">
                <!-- Categories toggle -->
            </div>

            <!-- Menu List -->
            <div id="menu-items-list" class="grid-mobile-list">
                <!-- Items injected here -->
            </div>
        </div>

        <div class="checkout-bar">
            <button id="btn-view-cart" class="btn"
                style="background:var(--surface-color); border:1px solid #E5E7EB; margin-bottom:0.5rem;">Riepilogo e
                Note Comanda</button>
            <button id="btn-send-order" class="btn btn-primary btn-send">Invia Comanda</button>
        </div>
    </div>

    <!-- Modale Aggiunta Piatto con Note -->
    <div id="modal-add-item" class="modal-overlay">
        <div class="bottom-sheet">
            <div class="sheet-header">
                <h3 id="modal-item-name">Aggiungi Piatto</h3>
                <button id="btn-close-modal" class="btn-round">✕</button>
            </div>
            <div
                style="margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: center; gap: 1.5rem;">
                <button id="btn-qty-minus" class="btn-round"
                    style="width:50px; height:50px; font-size:1.5rem;">-</button>
                <span id="modal-qty" style="font-size: 2rem; font-weight: 700;">1</span>
                <button id="btn-qty-plus" class="btn-round"
                    style="width:50px; height:50px; font-size:1.5rem;">+</button>
            </div>
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label>Note variante (es. Senza pomodoro)</label>
                <input type="text" id="modal-note" placeholder="Note specifiche piatto...">
            </div>
            <button id="btn-confirm-add" class="btn btn-primary btn-send">Conferma <span
                    id="modal-price"></span></button>
        </div>
    </div>

    <script type="module" src="js/cameriere/app.js"></script>
</body>

</html>
