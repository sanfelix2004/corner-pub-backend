<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <!--
      FIX: Removed maximum-scale=1.0 and user-scalable=no.
      These attributes block accessibility zoom (WCAG 1.4.4 violation) and can
      cause interaction issues on some Android browsers. The correct way to
      prevent unwanted iOS input zoom is to keep font-size >= 16px on inputs
      (already done in base.css). viewport-fit=cover enables env(safe-area-inset-*)
      support on notched iPhones.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Corner Pub - Cameriere</title>
    <!-- PWA / iOS home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#10B981">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- SweetAlert2 for Modals -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- WebSocket Libs -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/cameriere.css">
</head>

<body>

    <!-- LOGIN VIEW -->
    <div id="view-login" class="auth-wrapper" style="display: none;">
        <div class="auth-card">
            <h2>Accesso Staff</h2>
            <p>Corner Pub - Cameriere</p>
            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary">Accedi</button>
            </form>
        </div>
    </div>

    <!-- MAIN APP VIEW (Tables) -->
    <div id="view-tables" style="display: none;">
        <header class="app-header">
            <div class="app-title">Tavoli e Comande</div>
            <button id="btn-logout" class="btn-round" aria-label="Esci">🔌</button>
        </header>

        <!--
          FIX: Replaced inline flex styles with .tabs-cameriere class (defined in cameriere.css).
          Tab active state is now managed via .tab-btn / .tab-btn.active CSS classes
          instead of brittle JS inline style overrides.
        -->
        <div class="tabs-cameriere">
            <button id="btn-tab-tables" class="tab-btn active">Tavoli Aperti</button>
            <button id="btn-tab-archived" class="tab-btn">Storico Ultime 12h</button>
        </div>

        <div class="container">
            <div id="tables-list" class="grid-mobile-list">
                <!-- Tables injected here -->
            </div>

            <div id="archived-list" class="grid-mobile-list" style="display:none;">
                <!-- Archived orders injected here -->
            </div>

            <button id="btn-new-table" class="fab-bottom" aria-label="Apri nuovo tavolo">+</button>
        </div>
    </div>

    <!-- ORDER VIEW (Inside a table) -->
    <div id="view-order" style="display: none;">
        <header class="app-header">
            <button id="btn-back-tables" class="btn-round" aria-label="Torna ai tavoli">←</button>
            <div class="app-title">
                Tavolo <span id="current-table-display">--</span>
                <span id="current-table-coperti"
                    style="margin-left: 0.4rem; font-size: 0.8rem; color: var(--text-secondary);"></span>
                <span id="current-order-status"
                    style="margin-left: 0.5rem; font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 12px; font-weight: 600;"></span>
            </div>
            <div class="table-badge" id="order-badge">0 Righe</div>
        </header>

        <div class="container">
            <!--
              FIX: Added .search-scroll-row class (defined in cameriere.css) which
              hides the scrollbar consistently with #menu-categories.
            -->
            <div class="search-scroll-row">
                <input type="text" id="menu-search" placeholder="Cerca piatto...">
            </div>

            <div id="menu-categories">
                <!-- Categories toggle -->
            </div>

            <!-- Menu List -->
            <div id="menu-items-list" class="grid-mobile-list">
                <!-- Items injected here -->
            </div>
        </div>

        <div class="checkout-bar">
            <div style="display:flex; gap:0.5rem;">
                <button id="btn-view-cart" class="btn"
                    style="background:var(--surface-color); border:1px solid #E5E7EB; flex:1;">📋 Riepilogo</button>
                <button id="btn-table-history" class="btn"
                    style="background:var(--surface-color); border:1px solid #E5E7EB; flex:1;">🕐 Storico
                    Tavolo</button>
            </div>
            <button id="btn-send-order" class="btn btn-primary btn-send">Invia Comanda</button>
        </div>
    </div>

    <!-- Modale Aggiunta Piatto con Note -->
    <div id="modal-add-item" class="modal-overlay">
        <div class="bottom-sheet">
            <div class="sheet-header">
                <h3 id="modal-item-name">Aggiungi Piatto</h3>
                <button id="btn-close-modal" class="btn-round" aria-label="Chiudi">✕</button>
            </div>
            <div
                style="margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: center; gap: 1.5rem;">
                <button id="btn-qty-minus" class="btn-round" style="width:52px; height:52px; font-size:1.5rem;"
                    aria-label="Riduci quantità">−</button>
                <span id="modal-qty" style="font-size: 2rem; font-weight: 700;" aria-live="polite">1</span>
                <button id="btn-qty-plus" class="btn-round" style="width:52px; height:52px; font-size:1.5rem;"
                    aria-label="Aumenta quantità">+</button>
            </div>
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label>Note variante (es. Senza pomodoro)</label>
                <input type="text" id="modal-note" placeholder="Note specifiche piatto...">
            </div>
            <button id="btn-confirm-add" class="btn btn-primary btn-send">Conferma <span
                    id="modal-price"></span></button>
        </div>
    </div>

    <script type="module" src="js/cameriere/app.js"></script>
</body>

</html>
