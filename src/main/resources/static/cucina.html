<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1E1E1E">
    <title>Corner Pub - Cucina Dashboard</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- WebSocket Libs -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/cucina.css">
</head>

<body data-theme="dark">
    <!-- AUDIO UNLOCK BANNER (iOS Safari) -->
    <div id="audio-unlock-banner">
        🔊 Tocca qui per abilitare il suono delle comande! 🔊
    </div>

    <!-- LOGIN VIEW -->
    <div id="view-login" class="auth-wrapper">
        <!-- FIX: Removed inline height:100vh — .auth-wrapper in base.css now
             correctly uses min-height: 100svh with a 100vh fallback. -->
        <div class="auth-card">
            <h2>Accesso Cucina</h2>
            <p>Corner Pub</p>
            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary">Accedi</button>
            </form>
        </div>
    </div>

    <!-- KITCHEN DASHBOARD VIEW -->
    <div id="view-dashboard" style="display: none;">
        <header class="kitchen-header">
            <div class="kitchen-title">Comande Cucina</div>
            <div style="display:flex; gap: 1rem; align-items:center;">
                <div class="realtime-indicator">
                    <div id="ws-indicator" class="indicator-dot"></div>
                    <span id="ws-label">Offline</span>
                </div>
                <button id="btn-logout" class="btn"
                    style="background:#374151; color:white; padding:0.5rem 1.25rem; min-height:44px; flex-shrink:0;"
                    aria-label="Esci">Esci</button>
            </div>
        </header>

        <div class="tabs-cucina">
            <button id="btn-tab-active" class="tab-btn-cucina active">Attive</button>
            <button id="btn-tab-archived" class="tab-btn-cucina">Archiviate (Ultime 12h)</button>
        </div>

        <div id="kanban-board" class="kitchen-board">
            <!-- Tickets injected here -->
        </div>

        <!-- Empty State Container -->
        <div id="empty-state" style="display:none; text-align:center; padding-top:4rem; color:var(--text-secondary);">
            <svg style="width:100px; height:100px; opacity:0.2; margin-bottom:1rem;" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                </path>
            </svg>
            <h2>Nessuna comanda attiva</h2>
            <p>La cucina naviga a vista libera.</p>
        </div>
    </div>

    <script type="module" src="js/cucina/app.js"></script>
</body>

</html>
