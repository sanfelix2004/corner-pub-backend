<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corner Pub - Cucina Dashboard</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- WebSocket Libs -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/cucina.css">
</head>

<body data-theme="dark">

    <!-- LOGIN VIEW -->
    <div id="view-login" class="auth-wrapper"
        style="display: flex; height: 100vh; align-items: center; justify-content: center; width: 100%;">
        <div class="auth-card">
            <h2>Accesso Cucina</h2>
            <p>Corner Pub</p>
            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary">Accedi</button>
            </form>
        </div>
    </div>

    <!-- KITCHEN DASHBOARD VIEW -->
    <div id="view-dashboard" style="display: none;">
        <header class="kitchen-header">
            <div class="kitchen-title">Comande Cucina</div>
            <div style="display:flex; gap: 1rem; align-items:center;">
                <div class="realtime-indicator">
                    <div id="ws-indicator" class="indicator-dot"></div>
                    <span id="ws-label">Offline</span>
                </div>
                <button id="btn-logout" class="btn"
                    style="background:#374151; color:white; padding:0.5rem 1rem;">Esci</button>
            </div>
        </header>

        <div class="tabs-cucina"
            style="display:flex; gap:1rem; margin-bottom: 1rem; padding: 0 1.5rem; justify-content: center;">
            <button id="btn-tab-active" class="btn btn-primary" style="flex: 0 1 200px;">Attive</button>
            <button id="btn-tab-archived" class="btn"
                style="flex: 0 1 300px; background:var(--surface-color); border:1px solid #ccc; color:#333;">Archiviate
                (Ultime 12h)</button>
        </div>

        <div id="kanban-board" class="kitchen-board">
            <!-- Tickets injected here -->
        </div>

        <!-- Empty State Container -->
        <div id="empty-state" style="display:none; text-align:center; padding-top:4rem; color:var(--text-secondary);">
            <svg style="width:100px; height:100px; opacity:0.2; margin-bottom:1rem;" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                </path>
            </svg>
            <h2>Nessuna comanda attiva</h2>
            <p>La cucina naviga a vista libera.</p>
        </div>
    </div>

    <script type="module" src="js/cucina/app.js"></script>
</body>

</html>
